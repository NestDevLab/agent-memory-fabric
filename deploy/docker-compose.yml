name: amf-stack

# Legacy v2 local/shadow reference only. This file is not a production upgrade
# or operations runbook; use docs/deployment-procedure.md for production work
# and docs/agent-memory-fabric-roadmap.md for future migration work.
services:
  amf-server:
    build:
      context: ..
      dockerfile: Dockerfile
    image: agent-memory-fabric:0.6.0
    restart: unless-stopped
    init: true
    read_only: true
    user: "${AMF_SERVICE_UID:?required}:${AMF_SERVICE_GID:?required}"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    ports:
      - "127.0.0.1:${AMF_HOST_PORT:?required}:8787"
    environment:
      AMF_SERVER_ENABLED: "true"
      AMF_POLICY_PATH: /run/config/agent-memory-fabric-policy.json
      AMF_AUTH_REGISTRY_PATH: /run/secrets/agent-memory-fabric-auth.json
      AMF_RAW_KEY_RING_PATH: /run/secrets/agent-memory-fabric-key-ring.json
      AMF_INGEST_KEY_RING_PATH: /run/secrets/agent-memory-fabric-ingest-key-ring.json
      AMF_CONTEXT_KEY_RING_PATH: /run/secrets/agent-memory-fabric-context-key-ring.json
      AMF_POLICY_REVISION: "${AMF_POLICY_REVISION:?required}"
      AMF_PAM_MCP_SERVER_PATH: /opt/portable-agent-memory/tools/pam-mcp-server.mjs
      AMF_PAM_WORKSPACE: /srv/brain-shared
      AMF_PAM_RECORD_INDEX_PATH: /srv/brain-shared/memory/amf/record-index.json
      AMF_PAM_RUNTIME_PRIVATE_DIR: /run/amf-pam-private
      AMF_PAM_ROUTING_KEY_RING_PATH: /run/amf-pam-private/agent-memory-fabric-routing-key-ring.json
      PAM_WORKSPACE_CONFIG: /run/amf-pam-private/pam-workspace-config.json
      PAM_APPLICATOR_STATE_KEY_FILE: /run/amf-pam-private/pam-applicator-state-key
      PAM_APPLICATOR_TOKEN: "${PAM_APPLICATOR_TOKEN:?required}"
      AMF_DATA_PATH: /var/lib/agent-memory-fabric
      AMF_CATALOG_KIND: postgres
      AMF_CATALOG_DATABASE_URL: "postgresql://agent_memory_fabric:${AMF_DB_PASSWORD:?required}@postgres:5432/agent_memory_fabric"
      # The database is confined to this disposable Compose network and does
      # not expose TLS. Production transport policy belongs in the runbook.
      AMF_CATALOG_SSL_MODE: disable
      AMF_DOCUMENT_BACKEND: postgresql
      AMF_SEMANTIC_SEARCH_ENABLED: "true"
      AMF_SEMANTIC_EMBEDDING_BASE_URL: http://ollama:11434
      AMF_SEMANTIC_EMBEDDING_MODEL: nomic-embed-text
      AMF_SEMANTIC_EMBEDDING_DIMS: "768"
      AMF_MAX_BODY_BYTES: "1048576"
      MEM0_BACKEND_KIND: disabled
    volumes:
      - amf-data:/var/lib/agent-memory-fabric
      - ${AMF_POLICY_FILE:?required}:/run/config/agent-memory-fabric-policy.json:ro
      - ${AMF_AUTH_REGISTRY_FILE:?required}:/run/secrets/agent-memory-fabric-auth.json:ro
      - ${AMF_KEY_RING_FILE:?required}:/run/secrets/agent-memory-fabric-key-ring.json:ro
      - ${AMF_INGEST_KEY_RING_FILE:?required}:/run/secrets/agent-memory-fabric-ingest-key-ring.json:ro
      - ${AMF_CONTEXT_KEY_RING_FILE:?required}:/run/secrets/agent-memory-fabric-context-key-ring.json:ro
      - ${PAM_RUNTIME_DIR:?required}:/run/amf-pam-private
      - ${PAM_SOURCE_DIR:?required}:/opt/portable-agent-memory:ro
      - ${BRAIN_SHARED_DIR:?required}:/srv/brain-shared
      - ../scripts:/app/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(8787,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  postgres:
    image: pgvector/pgvector@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_memory_fabric
      POSTGRES_USER: agent_memory_fabric
      POSTGRES_PASSWORD: "${AMF_DB_PASSWORD:?required}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_memory_fabric -d agent_memory_fabric"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama@sha256:a6149234667efc71d37766d61c1a16f24c33e4cd7a0bf4125c44a7e47e2419c4
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama

volumes:
  # New named volumes start empty. They are never substitutes for an existing
  # data or catalog store.
  amf-data:
  pgdata:
  ollama-models:
