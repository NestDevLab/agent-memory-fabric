services:
  mem0-gateway:
    image: node:22-bookworm-slim
    working_dir: /app
    command: ["node", "src/server.mjs"]
    restart: unless-stopped
    env_file:
      - .env.runtime
    volumes:
      - ./:/app
      # Production deployments should mount a secret file and set:
      # MEM0_AUTH_REGISTRY_PATH=/run/secrets/mem0-auth-registry.json
      # - /root/.openclaw/secrets/mem0-auth-registry.json:/run/secrets/mem0-auth-registry.json:ro
    ports:
      - "8787:8787"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
